<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Universitaria UG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-layer-1" class="ambient-bg active"></div>
    <div id="bg-layer-2" class="ambient-bg"></div>
    <div class="ambient-overlay"></div>

    <div class="language-controls">
        <select id="lang-selector" class="lang-select">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="pt">Português</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <div class="calculator-container">
        <h2 data-i18n="title">Calculadora de Notas UG</h2>
        
        <div class="grid-layout">
            <div class="section-card">
                <h3 data-i18n="parcial1">1er Parcial</h3>
                <div class="input-group">
                    <label for="gf1" data-i18n="gf">Gestión Formativa</label>
                    <input type="number" id="gf1" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label for="gp1" data-i18n="gp">Gestión Práctica</label>
                    <input type="number" id="gp1" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label for="ex1" data-i18n="ex">Examen</label>
                    <input type="number" id="ex1" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="result-row">
                    <span data-i18n="prom1">Promedio 1er Parcial:</span>
                    <span id="prom1" class="highlight">0.00</span>
                </div>
            </div>

            <div class="section-card">
                <h3 data-i18n="parcial2">2do Parcial</h3>
                <div class="input-group">
                    <label for="gf2" data-i18n="gf">Gestión Formativa</label>
                    <input type="number" id="gf2" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label for="gp2" data-i18n="gp">Gestión Práctica</label>
                    <input type="number" id="gp2" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label for="ex2" data-i18n="ex">Examen</label>
                    <input type="number" id="ex2" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="result-row">
                    <span data-i18n="prom2">Promedio 2do Parcial:</span>
                    <span id="prom2" class="highlight">0.00</span>
                </div>
            </div>
        </div>

        <div class="results-card">
            <h3 data-i18n="resultados">Resultados Finales</h3>
            <div class="summary-grid">
                <div class="summary-item">
                    <span data-i18n="promSemestre">Promedio Semestre</span>
                    <span id="prom-semestre" class="highlight-total">---</span>
                </div>
                <div class="summary-item">
                    <span data-i18n="notaMinima">Nota Mínima Recuperación</span>
                    <span id="nota-recuperacion" class="highlight-warning" data-i18n="msgIngreso">Ingrese sus notas</span>
                </div>
            </div>
        </div>
    </div>

    <div class="watermark" data-i18n="footer">
        Desarrollado por Edison P. & Gemini
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="script.js"></script>
</body>
</html>
