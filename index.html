<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Universitaria UG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-layer-1" class="ambient-bg active"></div>
    <div id="bg-layer-2" class="ambient-bg"></div>
    <div class="ambient-overlay"></div>

    <div class="music-controls">
        <button id="music-btn" class="btn-music">Reproducir Musica</button>
        <audio id="bg-music" loop>
            <source src="musica.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="calculator-container">
        <h2>Calculadora de Notas UG</h2>
        
        <div class="grid-layout">
            <div class="section-card">
                <h3>1er Parcial</h3>
                <div class="input-group">
                    <label for="gf1">Gestión Formativa</label>
                    <input type="number" id="gf1" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label for="gp1">Gestión Práctica</label>
                    <input type="number" id="gp1" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label for="ex1">Examen</label>
                    <input type="number" id="ex1" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="result-row">
                    <span>Promedio 1er Parcial:</span>
                    <span id="prom1" class="highlight">0.00</span>
                </div>
            </div>

            <div class="section-card">
                <h3>2do Parcial</h3>
                <div class="input-group">
                    <label for="gf2">Gestión Formativa</label>
                    <input type="number" id="gf2" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label for="gp2">Gestión Práctica</label>
                    <input type="number" id="gp2" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label for="ex2">Examen</label>
                    <input type="number" id="ex2" step="0.01" min="0" max="10" placeholder="0.00">
                </div>
                <div class="result-row">
                    <span>Promedio 2do Parcial:</span>
                    <span id="prom2" class="highlight">0.00</span>
                </div>
            </div>
        </div>

        <div class="results-card">
            <h3>Resultados Finales</h3>
            <div class="summary-grid">
                <div class="summary-item">
                    <span>Promedio Semestre</span>
                    <span id="prom-semestre" class="highlight-total">---</span>
                </div>
                <div class="summary-item">
                    <span>Nota Mínima Recuperación</span>
                    <span id="nota-recuperacion" class="highlight-warning">Ingrese sus notas</span>
                </div>
            </div>
        </div>
    </div>

    <div class="watermark">
        Desarrollado por Edison Plaza & Gemini
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="script.js"></script>
</body>
</html>
